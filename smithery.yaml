name: explainability-report-mcp
description: 'AI Explainability and Transparency Reports for AI agents. Capabilities:
  transparency scan, model card generation, decision explanations, Article 13 audit,
  impact assessments. Built by MEOK AI Labs.'
version: 1.0.0
tools:
- name: quick_scan
  description: Describe an AI system, get instant transparency and explainability assessment. No API key required.
  parameters:
  - name: description
    type: string
    required: true
- name: generate_model_card
  description: Generate an EU AI Act compliant model card.
  parameters:
  - name: model_name
    type: string
    required: true
  - name: purpose
    type: string
    required: true
  - name: training_data
    type: string
    required: false
  - name: api_key
    type: string
    required: false
- name: explain_decision
  description: Generate human-readable explanation of an AI decision.
  parameters:
  - name: decision
    type: string
    required: true
  - name: factors
    type: string
    required: false
  - name: api_key
    type: string
    required: false
- name: transparency_audit
  description: Assess against EU AI Act Article 13 transparency requirements.
  parameters:
  - name: system_description
    type: string
    required: true
  - name: api_key
    type: string
    required: false
- name: create_impact_assessment
  description: Generate DPIA/AIIA template for an AI system.
  parameters:
  - name: system_name
    type: string
    required: true
  - name: affected_groups
    type: string
    required: false
  - name: api_key
    type: string
    required: false
